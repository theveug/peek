<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Peek - Create or Join a Room</title>
        <link rel="stylesheet" href="/assets/style.css" />
    </head>
    <body class="dark">
        <canvas id="gradient-canvas"></canvas>

        <div class="flex items-center justify-center h-screen relative z-10">
            <div class="surface-glass border border-separator rounded-2xl p-8 w-full max-w-md shadow-2xl">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold text-foreground tracking-tight">Peek</h1>
                    <p class="text-muted text-sm mt-1">Screen sharing & chat, peer-to-peer</p>
                </div>

                <!-- Saved Rooms -->
                <div id="saved-rooms-section" class="mb-6 hidden">
                    <h2 class="text-sm font-semibold text-muted uppercase tracking-wider mb-3">Saved Rooms</h2>
                    <div id="saved-rooms-list" class="space-y-2"></div>
                    <div id="saved-rooms-error" class="text-xs text-red-400 mt-2 hidden"></div>
                </div>

                <!-- Create Room -->
                <div class="mb-6">
                    <h2 class="text-sm font-semibold text-muted uppercase tracking-wider mb-3">Create a Room</h2>
                    <form id="create-form" class="space-y-3">
                        <input type="text" id="create-name" placeholder="Room name (optional)" class="w-full p-2.5 surface-input rounded-lg text-sm placeholder-muted focus:outline-none focus:ring-1 focus:ring-indigo-500/50" maxlength="50" />
                        <input type="password" id="create-password" placeholder="Password (optional)" class="w-full p-2.5 surface-input rounded-lg text-sm placeholder-muted focus:outline-none focus:ring-1 focus:ring-indigo-500/50" />
                        <div>
                            <select id="create-max-peers" class="w-full p-2.5 surface-input rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500/50">
                                <option value="4">Max 4 participants</option>
                                <option value="6" selected>Max 6 participants</option>
                                <option value="8">Max 8 participants</option>
                                <option value="10">Max 10 participants</option>
                                <option value="12">Max 12 participants</option>
                            </select>
                            <p class="text-xs text-muted mt-1">More than 6 may automatically reduce stream quality to keep things smooth.</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="create-save-room" class="rounded" />
                            <label for="create-save-room" class="text-xs text-muted">Save this room to this device</label>
                        </div>
                        <input type="text" id="create-save-label" placeholder="Label (optional)" class="w-full p-2 surface-input rounded-lg text-xs placeholder-muted hidden" maxlength="50" />
                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-2.5 rounded-lg text-sm font-medium transition-colors">Create Room</button>
                    </form>
                </div>

                <div class="flex items-center gap-3 mb-6">
                    <div class="flex-1 h-px bg-separator"></div>
                    <span class="text-xs text-muted">or</span>
                    <div class="flex-1 h-px bg-separator"></div>
                </div>

                <!-- Join Room -->
                <div>
                    <h2 class="text-sm font-semibold text-muted uppercase tracking-wider mb-3">Join a Room</h2>
                    <form id="join-form" class="space-y-3">
                        <input type="text" id="join-code" placeholder="Room code (5 characters)" class="w-full p-2.5 surface-input rounded-lg text-sm text-center tracking-widest font-mono placeholder-muted focus:outline-none focus:ring-1 focus:ring-indigo-500/50" maxlength="5" pattern="[A-Za-z0-9]{5}" required />
                        <div id="join-password-row" class="hidden">
                            <input type="password" id="join-password" placeholder="Enter room password" class="w-full p-2.5 surface-input rounded-lg text-sm placeholder-muted focus:outline-none focus:ring-1 focus:ring-indigo-500/50" />
                        </div>
                        <div id="join-error" class="text-xs text-red-400 hidden"></div>
                        <div id="join-room-name" class="text-xs text-muted hidden"></div>
                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="join-save-room" class="rounded" />
                            <label for="join-save-room" class="text-xs text-muted">Save this room to this device</label>
                        </div>
                        <input type="text" id="join-save-label" placeholder="Label (optional)" class="w-full p-2 surface-input rounded-lg text-xs placeholder-muted hidden" maxlength="50" />
                        <button type="submit" class="w-full surface-input hover:opacity-80 text-foreground py-2.5 rounded-lg text-sm font-medium transition-colors border border-separator">Join Room</button>
                    </form>
                </div>

                <div class="mt-6 flex justify-center">
                    <button id="theme-toggle" class="text-muted hover:text-foreground transition-colors p-2 rounded-lg" title="Toggle theme">
                        <svg id="theme-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                            <path d="M12 2.25a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0V3a.75.75 0 0 1 .75-.75ZM7.5 12a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM18.894 6.166a.75.75 0 0 0-1.06-1.06l-1.591 1.59a.75.75 0 1 0 1.06 1.061l1.591-1.59ZM21.75 12a.75.75 0 0 1-.75.75h-2.25a.75.75 0 0 1 0-1.5H21a.75.75 0 0 1 .75.75ZM17.834 18.894a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 1 0-1.061 1.06l1.59 1.591ZM12 18a.75.75 0 0 1 .75.75V21a.75.75 0 0 1-1.5 0v-2.25A.75.75 0 0 1 12 18ZM7.758 17.303a.75.75 0 0 0-1.061-1.06l-1.591 1.59a.75.75 0 0 0 1.06 1.061l1.591-1.59ZM6 12a.75.75 0 0 1-.75.75H3a.75.75 0 0 1 0-1.5h2.25A.75.75 0 0 1 6 12ZM6.697 7.757a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 0 0-1.061 1.06l1.59 1.591Z" />
                        </svg>
                        <svg id="theme-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 hidden">
                            <path fill-rule="evenodd" d="M9.528 1.718a.75.75 0 0 1 .162.819A8.97 8.97 0 0 0 9 6a9 9 0 0 0 9 9 8.97 8.97 0 0 0 3.463-.69.75.75 0 0 1 .981.98 10.503 10.503 0 0 1-9.694 6.46c-5.799 0-10.5-4.7-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 0 1 .818.162Z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <script type="module">
            import { initGradientBackground } from '/client/GradientBackground.js';
            import { initTheme } from '/client/ThemeManager.js';
            import { getSavedRooms, saveRoom, removeRoom } from '/client/savedRooms.js';

            initTheme();
            initGradientBackground();

            if (new URLSearchParams(location.search).get('full')) {
                const fullRoomError = document.getElementById('join-error');
                fullRoomError.textContent = 'Room is full.';
                fullRoomError.classList.remove('hidden');
            }

            // Create room
            const createBtn = document.querySelector('#create-form button[type="submit"]');
            const createSaveCheckbox = document.getElementById('create-save-room');
            const createSaveLabel = document.getElementById('create-save-label');
            createSaveCheckbox.addEventListener('change', () => {
                createSaveLabel.classList.toggle('hidden', !createSaveCheckbox.checked);
            });

            document.getElementById('create-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                createBtn.disabled = true;
                createBtn.textContent = 'Creating...';
                try {
                    const name = document.getElementById('create-name').value.trim();
                    const password = document.getElementById('create-password').value;
                    const maxPeers = document.getElementById('create-max-peers').value;
                    const res = await fetch('/api/create-room', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: name || null, password: password || null, maxPeers }),
                    });
                    const { code } = await res.json();
                    if (password) {
                        sessionStorage.setItem('roomPassword', password);
                    }
                    if (createSaveCheckbox.checked) {
                        saveRoom({ code, label: createSaveLabel.value || name, password });
                    }
                    createBtn.textContent = 'Joining...';
                    window.location.href = '/' + code;
                } catch {
                    createBtn.disabled = false;
                    createBtn.textContent = 'Create Room';
                }
            });

            // Join room
            const joinForm = document.getElementById('join-form');
            const joinCode = document.getElementById('join-code');
            const joinPasswordRow = document.getElementById('join-password-row');
            const joinPassword = document.getElementById('join-password');
            const joinError = document.getElementById('join-error');
            const joinRoomName = document.getElementById('join-room-name');
            const joinSaveCheckbox = document.getElementById('join-save-room');
            const joinSaveLabel = document.getElementById('join-save-label');
            joinSaveCheckbox.addEventListener('change', () => {
                joinSaveLabel.classList.toggle('hidden', !joinSaveCheckbox.checked);
            });

            const joinBtn = joinForm.querySelector('button[type="submit"]');

            // Shared by the manual join form and "Join" clicks on saved rooms.
            // Returns true on success (caller navigates away), false to let the caller re-show its own UI.
            async function attemptJoin(code, password, { onNeedsPassword, onWrongPassword, onFull } = {}) {
                const res = await fetch('/api/validate-room', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, password: password || null }),
                });
                const result = await res.json();

                if (result.full) {
                    onFull?.(result);
                    return false;
                }
                if (result.needsPassword) {
                    if (result.wrongPassword) onWrongPassword?.(result);
                    else onNeedsPassword?.(result);
                    return false;
                }
                if (password) sessionStorage.setItem('roomPassword', password);
                window.location.href = '/' + code;
                return true;
            }

            joinForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const code = joinCode.value.trim();
                if (code.length !== 5) return;

                joinBtn.disabled = true;
                joinBtn.textContent = 'Joining...';
                const password = joinPassword.value;
                try {
                    const joined = await attemptJoin(code, password, {
                        onFull: () => {
                            joinError.textContent = 'Room is full.';
                            joinError.classList.remove('hidden');
                        },
                        onNeedsPassword: (result) => {
                            joinPasswordRow.classList.remove('hidden');
                            joinPassword.focus();
                            if (result.name) {
                                joinRoomName.textContent = `Room: ${result.name}`;
                                joinRoomName.classList.remove('hidden');
                            }
                        },
                        onWrongPassword: (result) => {
                            joinPasswordRow.classList.remove('hidden');
                            joinPassword.focus();
                            if (result.name) {
                                joinRoomName.textContent = `Room: ${result.name}`;
                                joinRoomName.classList.remove('hidden');
                            }
                            joinError.textContent = 'Wrong password. Try again.';
                            joinError.classList.remove('hidden');
                        },
                    });
                    if (joined) {
                        joinError.classList.add('hidden');
                        if (joinSaveCheckbox.checked) {
                            saveRoom({ code, label: joinSaveLabel.value || code, password });
                        }
                        return;
                    }
                } catch {
                    // fall through to re-enable button below
                }
                joinBtn.disabled = false;
                joinBtn.textContent = 'Join Room';
            });

            // Auto-uppercase room code
            joinCode.addEventListener('input', () => {
                joinCode.value = joinCode.value.replace(/[^A-Za-z0-9]/g, '');
            });

            // --- Saved rooms panel ---
            const savedSection = document.getElementById('saved-rooms-section');
            const savedList = document.getElementById('saved-rooms-list');
            const savedError = document.getElementById('saved-rooms-error');

            function renderSavedRooms() {
                const rooms = getSavedRooms();
                savedSection.classList.toggle('hidden', rooms.length === 0);
                savedList.innerHTML = '';

                rooms.forEach((room) => {
                    const row = document.createElement('div');
                    row.className = 'flex items-center gap-2 p-2.5 surface-input rounded-lg';

                    const info = document.createElement('div');
                    info.className = 'flex-1 min-w-0';

                    const labelEl = document.createElement('div');
                    labelEl.className = 'text-sm font-medium truncate';
                    labelEl.textContent = room.label;
                    info.appendChild(labelEl);

                    const codeEl = document.createElement('div');
                    codeEl.className = 'text-[10px] text-muted font-mono tracking-widest';
                    codeEl.textContent = room.code + (room.password ? ' \u{1F512}' : '');
                    info.appendChild(codeEl);

                    row.appendChild(info);

                    const joinRowBtn = document.createElement('button');
                    joinRowBtn.type = 'button';
                    joinRowBtn.className = 'px-3 py-1.5 rounded-lg text-xs font-medium bg-indigo-600 hover:bg-indigo-500 text-white transition-colors shrink-0';
                    joinRowBtn.textContent = 'Join';
                    joinRowBtn.addEventListener('click', async () => {
                        savedError.classList.add('hidden');
                        joinRowBtn.disabled = true;
                        joinRowBtn.textContent = '...';
                        try {
                            await attemptJoin(room.code, room.password, {
                                onFull: () => {
                                    savedError.textContent = `"${room.label}" is full.`;
                                    savedError.classList.remove('hidden');
                                },
                                onNeedsPassword: () => {
                                    savedError.textContent = `"${room.label}" now needs a password — enter it below manually.`;
                                    savedError.classList.remove('hidden');
                                    joinCode.value = room.code;
                                    joinPasswordRow.classList.remove('hidden');
                                    joinPassword.focus();
                                },
                                onWrongPassword: () => {
                                    savedError.textContent = `"${room.label}" exists but the saved password is wrong — someone else may have recreated it. Enter the correct password below.`;
                                    savedError.classList.remove('hidden');
                                    joinCode.value = room.code;
                                    joinPasswordRow.classList.remove('hidden');
                                    joinPassword.focus();
                                },
                            });
                        } finally {
                            joinRowBtn.disabled = false;
                            joinRowBtn.textContent = 'Join';
                        }
                    });
                    row.appendChild(joinRowBtn);

                    const removeBtn = document.createElement('button');
                    removeBtn.type = 'button';
                    removeBtn.title = 'Remove';
                    removeBtn.className = 'p-1.5 rounded-lg text-muted hover:text-red-400 transition-colors shrink-0';
                    removeBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M8.75 1A2.75 2.75 0 0 0 6 3.75v.443c-.795.077-1.584.176-2.365.298a.75.75 0 1 0 .23 1.482l.149-.022.841 10.518A2.75 2.75 0 0 0 7.596 19h4.807a2.75 2.75 0 0 0 2.742-2.53l.841-10.52.149.023a.75.75 0 0 0 .23-1.482A41.03 41.03 0 0 0 14 4.193V3.75A2.75 2.75 0 0 0 11.25 1h-2.5ZM10 4c.84 0 1.673.025 2.5.075V3.75c0-.69-.56-1.25-1.25-1.25h-2.5c-.69 0-1.25.56-1.25 1.25v.325C8.327 4.025 9.16 4 10 4ZM8.58 7.72a.75.75 0 0 0-1.5.06l.3 7.5a.75.75 0 1 0 1.5-.06l-.3-7.5Zm4.34.06a.75.75 0 1 0-1.5-.06l-.3 7.5a.75.75 0 1 0 1.5.06l.3-7.5Z" clip-rule="evenodd" /></svg>';
                    removeBtn.addEventListener('click', () => {
                        removeRoom(room.code);
                        renderSavedRooms();
                    });
                    row.appendChild(removeBtn);

                    savedList.appendChild(row);
                });
            }

            renderSavedRooms();
        </script>
    </body>
</html>
