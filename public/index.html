<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Peek - Screen Share</title>
        <link rel="stylesheet" href="/assets/style.css" />
    </head>
    <body class="dark">
        <!-- Animated gradient background -->
        <canvas id="gradient-canvas"></canvas>

        <div class="flex flex-col h-screen max-h-screen overflow-hidden relative z-10">
            <div class="flex-grow flex h-full text-foreground">
                <div
                    class="chat-panel surface-glass flex flex-col h-full border-r border-separator relative"
                    id="chat">
                    <!-- Tab bar -->
                    <div class="flex border-b border-separator shrink-0">
                        <button id="tab-chat" class="flex-1 flex items-center justify-center gap-1.5 px-4 py-3 text-sm font-medium border-b-2 border-indigo-500 text-foreground transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
                                <path fill-rule="evenodd" d="M10 3c-4.31 0-8 3.033-8 7 0 2.024.978 3.825 2.499 5.085a3.478 3.478 0 0 1-.522 1.756.75.75 0 0 0 .584 1.143 5.976 5.976 0 0 0 3.243-1.053c.7.138 1.44.213 2.196.213 4.31 0 8-3.033 8-7s-3.69-7-8-7Z" clip-rule="evenodd" />
                            </svg>
                            Chat
                        </button>
                        <button id="tab-files" class="flex-1 flex items-center justify-center gap-1.5 px-4 py-3 text-sm font-medium border-b-2 border-transparent text-muted hover:text-foreground transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
                                <path d="M3 3.5A1.5 1.5 0 0 1 4.5 2h6.879a1.5 1.5 0 0 1 1.06.44l4.122 4.12A1.5 1.5 0 0 1 17 7.622V16.5a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 3 16.5v-13Z" />
                            </svg>
                            Files
                            <span id="files-tab-badge" class="hidden items-center justify-center text-[10px] bg-indigo-500 text-white rounded-full min-w-4.5 h-4.5 px-1 leading-none">0</span>
                        </button>
                    </div>
                    <!-- Chat tab -->
                    <div id="chat-tab-content" class="flex flex-col flex-1 min-h-0">
                        <div class="flex-1 overflow-auto" id="chat-log"></div>
                        <div id="typing-indicator" class="typing-indicator hidden"></div>
                        <div id="drop-zone-overlay" class="drop-zone-overlay">Drop files here</div>
                        <div id="reply-preview" class="reply-preview hidden"></div>
                        <div class="flex flex-col border-t border-separator">
                            <div class="p-3 flex gap-2 items-end" id="chat-input">
                                <textarea
                                    id="message"
                                    rows="2"
                                    placeholder="Type a message..."
                                    class="flex-1 p-3 resize-none surface-input rounded-lg text-sm placeholder-muted focus:outline-none focus:ring-1 focus:ring-indigo-500/50 transition-all"></textarea>
                                <button id="poll-btn" title="Create Poll" class="p-2 rounded-lg text-muted hover:text-foreground transition-colors shrink-0">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5">
                                        <path d="M15.5 2A1.5 1.5 0 0 0 14 3.5v13a1.5 1.5 0 0 0 3 0v-13A1.5 1.5 0 0 0 15.5 2ZM10.5 6A1.5 1.5 0 0 0 9 7.5v9a1.5 1.5 0 0 0 3 0v-9A1.5 1.5 0 0 0 10.5 6ZM5.5 10A1.5 1.5 0 0 0 4 11.5v5a1.5 1.5 0 0 0 3 0v-5A1.5 1.5 0 0 0 5.5 10Z" />
                                    </svg>
                                </button>
                                <button id="file-attach-btn" title="Share a file" class="p-2 rounded-lg text-muted hover:text-foreground transition-colors shrink-0">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5">
                                        <path fill-rule="evenodd" d="M15.621 4.379a3 3 0 0 0-4.242 0l-7 7a3 3 0 0 0 4.241 4.243h.001l.497-.5a.75.75 0 0 1 1.064 1.057l-.498.501-.002.002a4.5 4.5 0 0 1-6.364-6.364l7-7a4.5 4.5 0 0 1 6.368 6.36l-3.455 3.553A2.625 2.625 0 1 1 9.52 9.52l3.45-3.451a.75.75 0 1 1 1.061 1.06l-3.45 3.451a1.125 1.125 0 0 0 1.587 1.595l3.454-3.553a3 3 0 0 0 0-4.242Z" clip-rule="evenodd" />
                                    </svg>
                                </button>
                                <input type="file" id="file-input" class="hidden" multiple />
                            </div>
                        </div>
                    </div>
                    <!-- Files tab -->
                    <div id="files-tab-content" class="hidden flex-col flex-1 min-h-0">
                        <div id="files-empty-state" class="flex flex-col items-center justify-center flex-1 text-muted text-sm gap-3 p-6">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-10 h-10 opacity-30">
                                <path d="M5.625 1.5c-1.036 0-1.875.84-1.875 1.875v17.25c0 1.035.84 1.875 1.875 1.875h12.75c1.035 0 1.875-.84 1.875-1.875V12.75A3.75 3.75 0 0 0 16.5 9h-1.875a1.875 1.875 0 0 1-1.875-1.875V5.25A3.75 3.75 0 0 0 9 1.5H5.625Z" />
                                <path d="M12.971 1.816A5.23 5.23 0 0 1 14.25 5.25v1.875c0 .207.168.375.375.375H16.5a5.23 5.23 0 0 1 3.434 1.279 9.768 9.768 0 0 0-6.963-6.963Z" />
                            </svg>
                            <span>No files shared yet</span>
                        </div>
                        <div id="files-list" class="flex-1 overflow-auto px-3 py-2 flex flex-col gap-2"></div>
                        <div id="files-download-wrap" class="hidden shrink-0 p-3 border-t border-separator">
                            <button id="files-download-all" class="w-full py-2 px-4 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium transition-colors flex items-center justify-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
                                    <path d="M10.75 2.75a.75.75 0 0 0-1.5 0v8.614L6.295 8.235a.75.75 0 1 0-1.09 1.03l4.25 4.5a.75.75 0 0 0 1.09 0l4.25-4.5a.75.75 0 0 0-1.09-1.03l-2.955 3.129V2.75Z" />
                                    <path d="M3.5 12.75a.75.75 0 0 0-1.5 0v2.5A2.75 2.75 0 0 0 4.75 18h10.5A2.75 2.75 0 0 0 18 15.25v-2.5a.75.75 0 0 0-1.5 0v2.5c0 .69-.56 1.25-1.25 1.25H4.75c-.69 0-1.25-.56-1.25-1.25v-2.5Z" />
                                </svg>
                                Download all as ZIP
                            </button>
                        </div>
                    </div>
                </div>
                <div id="chat-resize-handle" class="chat-resize-handle"></div>

                <div
                    class="flex-grow flex flex-col items-center justify-center relative overflow-hidden"
                    id="videos">
                    <div id="focused-view" class="flex-grow w-full relative overflow-hidden" style="display:none;">
                        <video id="focused-video" autoplay playsinline muted class="absolute inset-0 w-full h-full object-contain" style="transform-origin: 0 0;"></video>
                        <button id="pip-button" type="button" title="Picture-in-picture" class="absolute top-2 right-2 text-white/80 bg-black/40 hover:bg-black/60 p-1.5 rounded-full transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
                                <path d="M2 4.75A2.75 2.75 0 0 1 4.75 2h10.5A2.75 2.75 0 0 1 18 4.75v6.5A2.75 2.75 0 0 1 15.25 14H4.75A2.75 2.75 0 0 1 2 11.25v-6.5ZM4.75 3.5c-.69 0-1.25.56-1.25 1.25v6.5c0 .69.56 1.25 1.25 1.25h10.5c.69 0 1.25-.56 1.25-1.25v-6.5c0-.69-.56-1.25-1.25-1.25H4.75Z" />
                                <path d="M11 8.75A1.75 1.75 0 0 1 12.75 7h2.5A1.75 1.75 0 0 1 17 8.75v2.5A1.75 1.75 0 0 1 15.25 13h-2.5A1.75 1.75 0 0 1 11 11.25v-2.5Z" />
                            </svg>
                        </button>
                    </div>
                    <div id="grid-view" class="flex-grow w-full gap-1 p-1 overflow-hidden" style="display:none;"></div>
                    <svg
                        id="spinner"
                        width="200"
                        height="200"
                        viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <style>
                            .spinner_6KQt {
                                animation: spinner_4IqM 3.2s
                                    cubic-bezier(0.52, 0.6, 0.25, 0.99) infinite;
                                fill: white;
                            }
                            @keyframes spinner_4IqM {
                                0% {
                                    transform: translate(12px, 12px) scale(0);
                                    opacity: 1;
                                }
                                100% {
                                    transform: translate(0, 0) scale(1);
                                    opacity: 0;
                                }
                            }
                        </style>
                        <path
                            class="spinner_6KQt"
                            d="M12,1A11,11,0,1,0,23,12,11,11,0,0,0,12,1Zm0,20a9,9,0,1,1,9-9A9,9,0,0,1,12,21Z"
                            transform="translate(12, 12) scale(0)" />
                    </svg>

                    <div
                        id="controls"
                        class="controls-bar controls-glass py-2.5 px-5 gap-3 rounded-2xl text-foreground flex z-50 shadow-2xl">
                        <button
                            id="share-toggle"
                            title="Start sharing"
                            class="rounded-full p-2 flex align-middle items-center justify-center hover:bg-white/10 transition-colors">
                            <svg id="share-play-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
                                <path fill-rule="evenodd" d="M4.5 5.653c0-1.427 1.529-2.33 2.779-1.643l11.54 6.347c1.295.712 1.295 2.573 0 3.286L7.28 19.99c-1.25.687-2.779-.217-2.779-1.643V5.653Z" clip-rule="evenodd" />
                            </svg>
                            <svg id="share-stop-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6 hidden">
                                <path fill-rule="evenodd" d="M4.5 7.5a3 3 0 0 1 3-3h9a3 3 0 0 1 3 3v9a3 3 0 0 1-3 3h-9a3 3 0 0 1-3-3v-9Z" clip-rule="evenodd" />
                            </svg>
                        </button>
                        <button
                            id="cam-toggle"
                            title="Turn on Camera"
                            class="rounded-full p-2 flex align-middle items-center justify-center hover:bg-white/10 transition-colors">
                            <!-- Camera off (slashed) -->
                            <svg id="cam-off-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
                                <path d="M3.53 2.47a.75.75 0 0 0-1.06 1.06l18 18a.75.75 0 1 0 1.06-1.06l-18-18ZM22.5 17.69c0 .471-.202.86-.504 1.124l-4.746-4.746V7.939l2.69-2.689c.944-.945 2.56-.276 2.56 1.06v11.38ZM15.75 7.5v5.068L7.682 4.5h5.068A2.25 2.25 0 0 1 15 6.75v.75ZM1.5 7.5c0-1.241 1.006-2.25 2.25-2.25H12v1.5H3.75a.75.75 0 0 0-.75.75v9c0 .414.336.75.75.75h9v1.5H3.75A2.25 2.25 0 0 1 1.5 16.5V7.5Z" />
                            </svg>
                            <!-- Camera on -->
                            <svg id="cam-on-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6 hidden">
                                <path d="M4.5 4.5a3 3 0 0 0-3 3v9a3 3 0 0 0 3 3h8.25a3 3 0 0 0 3-3v-9a3 3 0 0 0-3-3H4.5ZM19.94 18.75l-2.69-2.69V7.94l2.69-2.69c.944-.945 2.56-.276 2.56 1.06v11.38c0 1.336-1.616 2.005-2.56 1.06Z" />
                            </svg>
                        </button>
                        <button
                            id="mic-toggle"
                            title="Unmute Microphone"
                            class="rounded-full p-2 flex align-middle items-center justify-center hover:bg-white/10 transition-colors">
                            <!-- Mic off (slashed) -->
                            <svg id="mic-off-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
                                <path d="M1.5 1.5l21 21M10.34 3.66A3.75 3.75 0 0 1 15.75 6v3.09l-5.41-5.43ZM8.25 6.57V6a3.75 3.75 0 0 1 .19-1.18L4.6 1l-.85.85 3.48 3.48A5.96 5.96 0 0 0 6 9v3a6 6 0 0 0 9.35 4.97l1.42 1.42A7.48 7.48 0 0 1 12 20.25 7.5 7.5 0 0 1 4.5 12.75v-1.5a.75.75 0 0 1 1.5 0v1.5a6 6 0 0 0 2.25 4.68V6.57ZM12 17.25a3.75 3.75 0 0 1-3.75-3.75V9.82l7.13 7.13a3.73 3.73 0 0 1-3.38 2.3ZM18.75 11.25a.75.75 0 0 1 .75.75v.75a7.46 7.46 0 0 1-1.15 3.99l-1.1-1.1A5.96 5.96 0 0 0 18 12.75v-.75a.75.75 0 0 1 .75-.75ZM12 22.5a.75.75 0 0 1-.75-.75v-2.26a.75.75 0 0 1 1.5 0v2.26a.75.75 0 0 1-.75.75Z" />
                            </svg>
                            <!-- Mic on -->
                            <svg id="mic-on-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6 hidden">
                                <path d="M8.25 4.5a3.75 3.75 0 1 1 7.5 0v8.25a3.75 3.75 0 1 1-7.5 0V4.5Z" />
                                <path d="M6 10.5a.75.75 0 0 1 .75.75v1.5a5.25 5.25 0 1 0 10.5 0v-1.5a.75.75 0 0 1 1.5 0v1.5a6.751 6.751 0 0 1-6 6.709v2.291a.75.75 0 0 1-1.5 0v-2.291a6.751 6.751 0 0 1-6-6.709v-1.5A.75.75 0 0 1 6 10.5Z" />
                            </svg>
                        </button>
                        <button
                            id="deafen-toggle"
                            title="Deafen"
                            class="rounded-full p-2 flex align-middle items-center justify-center hover:bg-white/10 transition-colors">
                            <!-- Speaker on -->
                            <svg id="deafen-off-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
                                <path d="M13.5 4.06c0-1.336-1.616-2.005-2.56-1.06l-4.5 4.5H4.508c-1.141 0-2.318.664-2.66 1.905A9.76 9.76 0 0 0 1.5 12c0 .898.121 1.768.35 2.595.341 1.24 1.518 1.905 2.659 1.905h1.93l4.5 4.5c.945.945 2.561.276 2.561-1.06V4.06ZM18.584 5.106a.75.75 0 0 1 1.06 0c3.808 3.807 3.808 9.98 0 13.788a.75.75 0 0 1-1.06-1.06 8.25 8.25 0 0 0 0-11.668.75.75 0 0 1 0-1.06Z" />
                                <path d="M15.932 7.757a.75.75 0 0 1 1.061 0 6 6 0 0 1 0 8.486.75.75 0 0 1-1.06-1.061 4.5 4.5 0 0 0 0-6.364.75.75 0 0 1 0-1.06Z" />
                            </svg>
                            <!-- Speaker off (muted) -->
                            <svg id="deafen-on-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6 hidden">
                                <path d="M13.5 4.06c0-1.336-1.616-2.005-2.56-1.06l-4.5 4.5H4.508c-1.141 0-2.318.664-2.66 1.905A9.76 9.76 0 0 0 1.5 12c0 .898.121 1.768.35 2.595.341 1.24 1.518 1.905 2.659 1.905h1.93l4.5 4.5c.945.945 2.561.276 2.561-1.06V4.06ZM17.78 9.22a.75.75 0 1 0-1.06 1.06L18.44 12l-1.72 1.72a.75.75 0 1 0 1.06 1.06l1.72-1.72 1.72 1.72a.75.75 0 1 0 1.06-1.06L20.56 12l1.72-1.72a.75.75 0 1 0-1.06-1.06l-1.72 1.72-1.72-1.72Z" />
                            </svg>
                        </button>
                        <div class="w-px h-6 bg-white/10"></div>
                        <div class="flex items-center">
                            <button
                                id="togglechat"
                                title="Toggle Chat"
                                class="rounded-full p-2 flex relative flex-0 align-middle items-center justify-center hover:bg-white/10 transition-colors">
                                <div
                                    id="new-message-indicator"
                                    class="w-3 h-3 bg-red-600 absolute -top-1 -right-1 rounded-full hidden"></div>
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                    class="size-6">
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193-.34.027-.68.052-1.02.072v3.091l-3-3c-1.354 0-2.694-.055-4.02-.163a2.115 2.115 0 0 1-.825-.242m9.345-8.334a2.126 2.126 0 0 0-.476-.095 48.64 48.64 0 0 0-8.048 0c-1.131.094-1.976 1.057-1.976 2.192v4.286c0 .837.46 1.58 1.155 1.951m9.345-8.334V6.637c0-1.621-1.152-3.026-2.76-3.235A48.455 48.455 0 0 0 11.25 3c-2.115 0-4.198.137-6.24.402-1.608.209-2.76 1.614-2.76 3.235v6.226c0 1.621 1.152 3.026 2.76 3.235.577.075 1.157.14 1.74.194V21l4.155-4.155" />
                                </svg>
                            </button>
                        </div>
                        <div class="flex items-center">
                            <button
                                id="toggle-members"
                                title="Toggle Members"
                                class="rounded-full p-2 flex relative flex-0 align-middle items-center justify-center hover:bg-white/10 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
                                    <path d="M8.25 6.75a3.75 3.75 0 1 1 7.5 0 3.75 3.75 0 0 1-7.5 0ZM15.75 9.75a3 3 0 1 1 6 0 3 3 0 0 1-6 0ZM2.25 9.75a3 3 0 1 1 6 0 3 3 0 0 1-6 0ZM6.31 15.117A6.745 6.745 0 0 1 12 12a6.745 6.745 0 0 1 6.709 7.498.75.75 0 0 1-.372.568A12.696 12.696 0 0 1 12 21.75c-2.305 0-4.47-.612-6.337-1.684a.75.75 0 0 1-.372-.568 6.787 6.787 0 0 1 1.019-4.38Z" />
                                    <path d="M5.082 14.254a8.287 8.287 0 0 0-1.308 5.135 9.687 9.687 0 0 1-1.764-.44l-.115-.04a.563.563 0 0 1-.373-.487l-.01-.121a3.75 3.75 0 0 1 3.57-4.047ZM20.226 19.389a8.287 8.287 0 0 0-1.308-5.135 3.75 3.75 0 0 1 3.57 4.047l-.01.121a.563.563 0 0 1-.373.486l-.115.04c-.567.2-1.156.349-1.764.441Z" />
                                </svg>
                            </button>
                        </div>
                        <div class="w-px h-6 bg-white/10"></div>
                        <div class="flex items-center" id="grid-toggle" style="display:none;">
                            <button
                                id="grid-button"
                                title="Toggle Grid View"
                                class="rounded-full p-2 flex relative flex-0 align-middle items-center justify-center hover:bg-white/10 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
                                    <path fill-rule="evenodd" d="M3 6a3 3 0 0 1 3-3h2.25a3 3 0 0 1 3 3v2.25a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V6Zm9.75 0a3 3 0 0 1 3-3H18a3 3 0 0 1 3 3v2.25a3 3 0 0 1-3 3h-2.25a3 3 0 0 1-3-3V6ZM3 15.75a3 3 0 0 1 3-3h2.25a3 3 0 0 1 3 3V18a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3v-2.25Zm9.75 0a3 3 0 0 1 3-3H18a3 3 0 0 1 3 3V18a3 3 0 0 1-3 3h-2.25a3 3 0 0 1-3-3v-2.25Z" clip-rule="evenodd" />
                                </svg>
                            </button>
                        </div>
                        <div class="flex items-center">
                            <button
                                id="settings-button"
                                class="rounded-full p-2 flex relative flex-0 align-middle items-center justify-center hover:bg-white/10 transition-colors">
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    viewBox="0 0 24 24"
                                    fill="currentColor"
                                    class="size-6">
                                    <path
                                        fill-rule="evenodd"

                <!-- Right sidebar: Active participants (Discord-style) -->
                <div id="members-resize-handle" class="members-resize-handle"></div>
                <div class="members-panel surface-glass flex flex-col h-full border-l border-separator" id="members-sidebar">
                    <div class="flex items-center justify-between px-4 py-3 border-b border-separator">
                        <span class="text-xs font-semibold text-muted uppercase tracking-wider">Online</span>
                        <span id="member-count" class="text-xs text-muted font-mono">0</span>
                    </div>
                    <div class="flex-1 overflow-auto px-2 py-2" id="participants"></div>
                </div>
            </div>

        <!-- Mobile backdrop for panel overlays -->
        <div id="mobile-backdrop" class="mobile-backdrop"></div>

        <!-- Room name header (shown when room has a name) -->
        <div id="room-header" class="fixed top-3 left-1/2 -translate-x-1/2 z-50 surface-glass border border-separator rounded-full px-4 py-1.5 text-xs font-medium text-muted hidden"></div>

        <!-- Password Modal (for direct links to password-protected rooms) -->
        <div id="password-modal" class="fixed inset-0 z-100 hidden">
            <div class="absolute inset-0 bg-black/70"></div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 surface-elevated text-foreground rounded-xl p-6 w-full max-w-sm shadow-2xl border border-separator">
                <h2 class="text-lg font-bold mb-1">Room Password Required</h2>
                <p id="password-room-name" class="text-sm text-muted mb-4"></p>
                <form id="password-form">
                    <input type="password" id="password-input" placeholder="Enter password" class="w-full p-2.5 surface-input rounded-lg text-sm placeholder-muted focus:outline-none focus:ring-1 focus:ring-indigo-500/50 mb-2" autofocus />
                    <p id="password-error" class="text-xs text-red-400 hidden mb-2">Wrong password</p>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-2.5 rounded-lg text-sm font-medium transition-colors">Join</button>
                </form>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal" class="fixed inset-0 z-100 hidden">
            <div class="absolute inset-0 bg-black/70" id="settings-backdrop"></div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 surface-elevated text-foreground rounded-xl p-6 w-full max-w-md shadow-2xl border border-separator">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Settings</h2>
                    <button id="close-settings" class="text-muted hover:text-white text-2xl leading-none">&times;</button>
                </div>
                <form id="settings-form" class="space-y-4">
                    <div>
                        <label for="settings-nickname" class="block mb-1 text-sm text-muted">Nickname</label>
                        <input type="text" id="settings-nickname" class="w-full p-2 rounded surface-input" />
                    </div>
                    <div>
                        <label class="block mb-1 text-sm text-muted">Status</label>
                        <div id="status-picker" class="flex gap-2">
                            <button type="button" data-status="online" class="status-pick flex items-center gap-1.5 px-3 py-1.5 rounded-lg surface-input text-xs font-medium transition-all" title="Online">
                                <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 inline-block"></span> Online
                            </button>
                            <button type="button" data-status="away" class="status-pick flex items-center gap-1.5 px-3 py-1.5 rounded-lg surface-input text-xs font-medium transition-all" title="Away">
                                <span class="w-2.5 h-2.5 rounded-full bg-yellow-500 inline-block"></span> Away
                            </button>
                            <button type="button" data-status="dnd" class="status-pick flex items-center gap-1.5 px-3 py-1.5 rounded-lg surface-input text-xs font-medium transition-all" title="Do Not Disturb">
                                <span class="w-2.5 h-2.5 rounded-full bg-red-500 inline-block"></span> DND
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="settings-mute" class="accent-indigo-500" />
                        <label for="settings-mute" class="text-sm">Mute Sounds</label>
                    </div>
                    <div>
                        <label for="settings-volume" class="block mb-1 text-sm text-muted">Notification Volume</label>
                        <input id="settings-volume" type="range" min="0" max="1" step="0.01" class="w-full" />
                        <p id="settings-volume-value" class="text-xs text-muted">30%</p>
                    </div>
                    <div>
                        <label class="block mb-1 text-sm text-muted">Screen Share Quality</label>
                        <div class="flex gap-3">
                            <select id="settings-res" class="p-2 surface-input rounded text-sm">
                                <option value="1280x720">720p</option>
                                <option value="1920x1080">1080p</option>
                                <option value="2560x1440">1440p</option>
                                <option value="source">Source</option>
                            </select>
                            <select id="settings-fps" class="p-2 surface-input rounded text-sm">
                                <option value="10">10 FPS</option>
                                <option value="15">15 FPS</option>
                                <option value="30">30 FPS</option>
                                <option value="60">60 FPS</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block mb-1 text-sm text-muted">Webcam Quality</label>
                        <div class="flex gap-3">
                            <select id="settings-cam-res" class="p-2 surface-input rounded text-sm">
                                <option value="640x360">360p</option>
                                <option value="640x480">480p</option>
                                <option value="1280x720">720p</option>
                                <option value="source">Source</option>
                            </select>
                            <select id="settings-cam-fps" class="p-2 surface-input rounded text-sm">
                                <option value="10">10 FPS</option>
                                <option value="15">15 FPS</option>
                                <option value="24">24 FPS</option>
                                <option value="30">30 FPS</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label for="settings-max-messages" class="block mb-1 text-sm text-muted">Max Chat Messages</label>
                        <input type="number" id="settings-max-messages" class="w-24 p-2 surface-input rounded text-sm" min="10" max="500" />
                    </div>
                    <div class="border-t border-separator pt-4">
                        <label class="block mb-2 text-sm text-muted font-medium">Mic Mode</label>
                        <div class="flex gap-2 mb-3">
                            <button type="button" data-mic-mode="toggle" class="mic-mode-pick flex-1 px-3 py-1.5 rounded-lg surface-input text-xs font-medium transition-all text-center">Toggle</button>
                            <button type="button" data-mic-mode="push-to-talk" class="mic-mode-pick flex-1 px-3 py-1.5 rounded-lg surface-input text-xs font-medium transition-all text-center">Push to Talk</button>
                            <button type="button" data-mic-mode="push-to-mute" class="mic-mode-pick flex-1 px-3 py-1.5 rounded-lg surface-input text-xs font-medium transition-all text-center">Push to Mute</button>
                        </div>
                        <div id="keybind-row" class="hidden">
                            <label class="block mb-1 text-sm text-muted">Keybind</label>
                            <div class="flex items-center gap-2">
                                <input type="text" id="settings-keybind" readonly class="w-full p-2 surface-input rounded text-sm text-center cursor-pointer" placeholder="Click then press a key..." />
                                <button type="button" id="keybind-clear" class="text-xs text-muted hover:text-foreground px-2 py-1">&times;</button>
                            </div>
                            <p class="text-[10px] text-muted mt-1">Click the field, then press the key you want to bind.</p>
                        </div>
                    </div>
                    <div class="flex gap-3 pt-2">
                        <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded text-sm">Save</button>
                        <button type="button" id="cancel-settings" class="surface-input hover:opacity-80 px-4 py-2 rounded text-sm">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Poll modal -->
        <div id="poll-modal" class="fixed inset-0 z-100 hidden">
            <div class="absolute inset-0 bg-black/70" id="poll-backdrop"></div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 surface-elevated text-foreground rounded-xl p-6 w-full max-w-sm shadow-2xl border border-separator">
                <h2 class="text-lg font-bold mb-4">Create Poll</h2>
                <div class="mb-4">
                    <label class="block text-xs text-muted font-medium mb-1">Question</label>
                    <input id="poll-question" type="text" placeholder="Ask a question…" class="w-full surface-input rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500/50" />
                </div>
                <div class="mb-4">
                    <label class="block text-xs text-muted font-medium mb-2">Options</label>
                    <div id="poll-options-list" class="flex flex-col gap-2">
                        <input type="text" class="poll-option-input w-full surface-input rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500/50" placeholder="Option 1" />
                        <input type="text" class="poll-option-input w-full surface-input rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500/50" placeholder="Option 2" />
                    </div>
                    <button id="poll-add-option" class="mt-2 text-xs text-indigo-400 hover:text-indigo-300 transition-colors">+ Add option</button>
                </div>
                <p id="poll-validation" class="text-xs text-red-400 mb-3 hidden">Add a question and at least 2 options.</p>
                <div class="flex gap-3 justify-end">
                    <button id="poll-cancel" class="px-4 py-2 text-sm rounded-lg text-muted hover:text-foreground transition-colors">Cancel</button>
                    <button id="poll-create-submit" class="px-4 py-2 text-sm rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white font-medium transition-colors">Create Poll</button>
                </div>
            </div>
        </div>
